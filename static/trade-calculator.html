<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynastyDroid - AI Trade Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A1428;
            --card: rgba(17, 24, 39, 0.8);
            --border: rgba(55, 65, 81, 0.5);
            --gold: #F59E0B;
            --cyan: #06B6D4;
            --pos-qb: #EF4444;
            --pos-rb: #10B981;
            --pos-wr: #3B82F6;
            --pos-te: #8B5CF6;
            --pos-pick: #6B7280;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at top left, rgba(6, 182, 212, 0.07) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.07) 0%, transparent 40%);
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .font-bebas { font-family: 'Bebas Neue', sans-serif; }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white; /* Increased readability */
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        .player-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-card:hover { border-color: var(--cyan); background: rgba(255, 255, 255, 0.05); }
        .player-card.selected { border-color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        .pos-badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 4px;
            min-width: 34px;
            text-align: center;
            color: white;
        }

        .pos-QB { background: var(--pos-qb); }
        .pos-RB { background: var(--pos-rb); }
        .pos-WR { background: var(--pos-wr); }
        .pos-TE { background: var(--pos-te); }
        .pos-Pick { background: var(--pos-pick); }

        .search-results-overlay {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 50;
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--gold), #D97706);
            color: #000;
            font-weight: 800;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            border-radius: 14px;
            transition: all 0.3s;
        }

        .btn-analyze:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .btn-analyze:disabled { opacity: 0.3; filter: grayscale(1); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
        .winning-side { animation: pulse-glow 2s infinite; border-color: var(--cyan); }

        .mobile-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <!-- Navbar / Header -->
    <nav class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center shadow-lg shadow-amber-400/20">
                <svg viewBox="0 0 24 24" class="w-6 h-6 text-slate-900" fill="currentColor">
                    <path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.6,5.39 13,5.73V7H14A7,7 0 0,1 21,14V22H3V14A7,7 0 0,1 10,7H11V5.73C10.4,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A2.5,2.5 0 0,0 5,15.5A2.5,2.5 0 0,0 7.5,18A2.5,2.5 0 0,0 10,15.5A2.5,2.5 0 0,0 7.5,13M16.5,13A2.5,2.5 0 0,0 14,15.5A2.5,2.5 0 0,0 16.5,18A2.5,2.5 0 0,0 19,15.5A2.5,2.5 0 0,0 16.5,13Z" />
                </svg>
            </div>
            <div>
                <span class="text-2xl font-bold tracking-tighter font-bebas block leading-none">DYNASTY DROID</span>
                <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">AI Trade Engine</span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 cursor-pointer group">
                <span class="text-[10px] font-bold text-gray-500 group-hover:text-purple-400 transition-colors uppercase">TE Premium</span>
                <input type="checkbox" id="tePremium" class="w-4 h-4 rounded border-gray-700 bg-gray-800 text-purple-600 focus:ring-purple-500">
            </label>
        </div>
    </nav>

    <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-7xl mx-auto">
        <!-- GIVE SIDE -->
        <section id="giveContainer" class="lg:col-span-4 glass-panel p-5 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-red-400 font-bebas tracking-wide uppercase">Outgoing Assets</h2>
                <span class="text-[10px] font-mono text-gray-600" id="giveCount">0 Items</span>
            </div>

            <div class="relative mb-4">
                <input type="text" id="giveSearch" class="search-input" placeholder="Add player to give..." oninput="onSearchInput('give')">
                <div id="giveSearchResults" class="search-results-overlay" style="display:none"></div>
            </div>

            <div id="giveSelectedList" class="flex-1 space-y-2 min-h-[150px] max-h-[400px] overflow-y-auto">
                <!-- Selected players only -->
            </div>

            <div class="mt-4 pt-4 border-t border-gray-800 flex justify-between items-end">
                <div>
                    <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Base Value</span>
                    <span class="text-2xl font-bebas text-red-400" id="giveValue">0</span>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Stud Bonus</span>
                    <span class="text-xl font-bebas text-amber-500" id="giveBonus">+0</span>
                </div>
            </div>
        </section>

        <!-- CENTER / SUMMARY -->
        <section class="lg:col-span-4 flex flex-col gap-6 order-last lg:order-none">
            <div class="glass-panel p-6 flex-1 flex flex-col items-center justify-center text-center">
                <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mb-2">Market Delta</p>
                <div class="font-bebas text-6xl mb-1 even" id="tradeDiff">EVEN</div>
                <p class="text-xs text-gray-500 mb-8" id="tradeLabel">No assets selected</p>

                <button id="analyzeBtn" onclick="analyze()" disabled class="btn-analyze w-full py-4 shadow-xl">
                    ANALYZE BLEND
                </button>

                <div class="grid grid-cols-2 w-full gap-4 mt-10">
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase font-black">Adjusted Give</p>
                        <p class="text-xl font-bebas" id="summaryGiveVal">0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase font-black">Adjusted Get</p>
                        <p class="text-xl font-bebas" id="summaryGetVal">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- GET SIDE -->
        <section id="getContainer" class="lg:col-span-4 glass-panel p-5 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-green-400 font-bebas tracking-wide uppercase">Incoming Assets</h2>
                <span class="text-[10px] font-mono text-gray-600" id="getCount">0 Items</span>
            </div>

            <div class="relative mb-4">
                <input type="text" id="getSearch" class="search-input" placeholder="Add player to get..." oninput="onSearchInput('get')">
                <div id="getSearchResults" class="search-results-overlay" style="display:none"></div>
            </div>

            <div id="getSelectedList" class="flex-1 space-y-2 min-h-[150px] max-h-[400px] overflow-y-auto">
                <!-- Selected players only -->
            </div>

            <div class="mt-4 pt-4 border-t border-gray-800 flex justify-between items-end">
                <div>
                    <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Base Value</span>
                    <span class="text-2xl font-bebas text-green-400" id="getValue">0</span>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest block">Stud Bonus</span>
                    <span class="text-xl font-bebas text-amber-500" id="getBonus">+0</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Results -->
    <div id="resultsModal" class="fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-4" style="display:none">
        <div class="glass-panel w-full max-w-3xl p-8 max-h-[90vh] overflow-y-auto border-cyan-500/30">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-4xl font-bold font-bebas tracking-tight">ANALYSIS RESULTS</h2>
                <button onclick="closeResults()" class="text-gray-500 hover:text-white">✕</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="h-48 flex items-center justify-center">
                    <canvas id="balanceChart"></canvas>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-black/40 p-3 rounded-xl border border-red-500/20 text-center">
                            <span class="text-[9px] text-gray-500 block">GIVE</span>
                            <span class="text-xl font-bebas text-red-400" id="modalGiveVal">0</span>
                        </div>
                        <div class="bg-black/40 p-3 rounded-xl border border-gray-500/20 text-center">
                            <span class="text-[9px] text-gray-500 block">DIFF</span>
                            <span class="text-xl font-bebas" id="modalDiffVal">0</span>
                        </div>
                        <div class="bg-black/40 p-3 rounded-xl border border-green-500/20 text-center">
                            <span class="text-[9px] text-gray-500 block">GET</span>
                            <span class="text-xl font-bebas text-green-400" id="modalGetVal">0</span>
                        </div>
                    </div>
                    <div class="bg-cyan-500/5 p-4 rounded-xl border border-cyan-500/20">
                        <p class="text-[10px] font-bold text-cyan-400 uppercase mb-2">Roger AI Insights</p>
                        <p id="modalNarrative" class="text-gray-300 text-xs italic leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <button class="btn-analyze flex-1 py-3" onclick="shareTrade()">Copy to Clipboard</button>
                <button class="bg-white/5 hover:bg-white/10 px-8 rounded-14 font-bold text-sm" onclick="closeResults()">Back</button>
            </div>
        </div>
    </div>

    <!-- Mobile Sticky Footer -->
    <div class="mobile-bar md:hidden" id="mobileSummary" style="display:none">
        <div>
            <span class="text-[9px] text-gray-500 uppercase block font-bold">Difference</span>
            <span class="text-xl font-bebas" id="mobileDiff">EVEN</span>
        </div>
        <button onclick="analyze()" class="btn-analyze px-6 py-2 text-sm">Analyze</button>
    </div>

<script>
    let allPlayers = [];
    let give = [];
    let get = [];
    let balanceChart = null;

    // Initialization
    fetch('/ktc_values.json')
        .then(r => r.json())
        .then(data => {
            allPlayers = data;
            updateUI();
        });

    function onSearchInput(side) {
        const query = document.getElementById(side + 'Search').value.trim().toLowerCase();
        const resultsEl = document.getElementById(side + 'SearchResults');
        
        if (query.length < 2) {
            resultsEl.style.display = 'none';
            return;
        }

        const selectedNames = new Set([...give, ...get].map(p => p.name));
        const filtered = allPlayers.filter(p => 
            !selectedNames.has(p.name) && 
            p.name.toLowerCase().includes(query)
        ).slice(0, 10);

        if (filtered.length === 0) {
            resultsEl.innerHTML = '<div class="p-4 text-xs text-gray-500 text-center font-bold">No players found</div>';
        } else {
            resultsEl.innerHTML = filtered.map(p => `
                <div class="p-4 border-b border-gray-800 hover:bg-gray-800 cursor-pointer flex justify-between items-center transition-colors" 
                     onclick="addPlayerById('${p.id}', '${side}')">
                    <div class="flex items-center gap-3">
                        <span class="pos-badge pos-${p.pos}">${p.pos}</span>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-white">${p.name}</span>
                            <span class="text-[9px] text-gray-500 uppercase tracking-tighter">${p.team || 'Free Agent'}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bebas text-amber-500 tracking-wider">${p.value.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }
        resultsEl.style.display = 'block';
    }

    function addPlayerById(id, side) {
        const player = allPlayers.find(p => p.id === id);
        if (!player) return;
        
        if (side === 'give') give.push(player);
        else get.push(player);

        // Clear search
        const searchInput = document.getElementById(side + 'Search');
        const resultsEl = document.getElementById(side + 'SearchResults');
        searchInput.value = '';
        resultsEl.style.display = 'none';
        
        updateUI();
    }

    function removePlayer(id, side) {
        if (side === 'give') give = give.filter(p => p.id !== id);
        else get = get.filter(p => p.id !== id);
        updateUI();
    }

    function updateUI() {
        renderSelectedList('give');
        renderSelectedList('get');
        
        const gvRaw = give.reduce((s, p) => s + p.value, 0);
        const rvRaw = get.reduce((s, p) => s + p.value, 0);

        // --- Stud Bonus Calculation ---
        const THRESHOLD = 0.38;
        const MULTIPLIER = 0.70;
        
        let giveBonus = 0;
        let getBonus = 0;

        const maxGive = give.length ? Math.max(...give.map(p => p.value)) : 0;
        const maxGet = get.length ? Math.max(...get.map(p => p.value)) : 0;

        if (maxGive > maxGet && rvRaw > 0) {
            const ratio = maxGive / rvRaw;
            if (ratio > THRESHOLD) {
                const excess = maxGive - (rvRaw * THRESHOLD);
                giveBonus = Math.round(excess * MULTIPLIER);
            }
        } else if (maxGet > maxGive && gvRaw > 0) {
            const ratio = maxGet / gvRaw;
            if (ratio > THRESHOLD) {
                const excess = maxGet - (gvRaw * THRESHOLD);
                getBonus = Math.round(excess * MULTIPLIER);
            }
        }

        const gvAdjusted = gvRaw + giveBonus;
        const rvAdjusted = rvRaw + getBonus;
        const diff = rvAdjusted - gvAdjusted;

        // Update basic values
        document.getElementById('giveValue').textContent = gvRaw.toLocaleString();
        document.getElementById('getValue').textContent = rvRaw.toLocaleString();
        
        // Update Bonus Labels
        document.getElementById('giveBonus').textContent = '+' + giveBonus.toLocaleString();
        document.getElementById('getBonus').textContent = '+' + getBonus.toLocaleString();
        document.getElementById('giveBonus').className = giveBonus > 0 ? 'text-xl font-bebas text-amber-500' : 'text-xl font-bebas text-gray-700';
        document.getElementById('getBonus').className = getBonus > 0 ? 'text-xl font-bebas text-amber-500' : 'text-xl font-bebas text-gray-700';

        // Update Summary values
        document.getElementById('summaryGiveVal').textContent = gvAdjusted.toLocaleString();
        document.getElementById('summaryGetVal').textContent = rvAdjusted.toLocaleString();

        const diffEl = document.getElementById('tradeDiff');
        const labelEl = document.getElementById('tradeLabel');
        const mobileDiff = document.getElementById('mobileDiff');

        if (give.length === 0 && get.length === 0) {
            diffEl.textContent = 'EVEN';
            diffEl.className = 'font-bebas text-6xl mb-1 even text-gray-600';
            labelEl.textContent = 'No assets selected';
        } else if (Math.abs(diff) < 100) {
            diffEl.textContent = 'FAIR';
            diffEl.className = 'font-bebas text-6xl mb-1 even text-gray-400';
            labelEl.textContent = 'Values are closely matched';
        } else if (diff > 0) {
            diffEl.textContent = '+' + diff.toLocaleString();
            diffEl.className = 'font-bebas text-6xl mb-1 win text-green-500';
            labelEl.textContent = 'Get side is leading';
        } else {
            diffEl.textContent = diff.toLocaleString();
            diffEl.className = 'font-bebas text-6xl mb-1 loss text-red-500';
            labelEl.textContent = 'Give side is leading';
        }

        mobileDiff.textContent = diffEl.textContent;
        mobileDiff.className = 'font-bebas text-xl ' + diffEl.className;

        document.getElementById('analyzeBtn').disabled = (give.length === 0 || get.length === 0);
        document.getElementById('mobileSummary').style.display = (give.length > 0 || get.length > 0) ? 'flex' : 'none';

        // Winning side glow - based on adjusted diff
        document.getElementById('getContainer').classList.toggle('winning-side', diff > 500);
        document.getElementById('giveContainer').classList.toggle('winning-side', diff < -500);

        document.getElementById('giveCount').textContent = give.length + ' Items';
        document.getElementById('getCount').textContent = get.length + ' Items';
    }

    function renderSelectedList(side) {
        const list = side === 'give' ? give : get;
        const el = document.getElementById(side + 'SelectedList');
        
        if (list.length === 0) {
            el.innerHTML = '<div class="h-full flex flex-col items-center justify-center border-2 border-dashed border-gray-800 rounded-xl py-10 text-gray-600 space-y-2"> <span class="text-2xl opacity-20">📥</span> <span class="text-[10px] uppercase font-bold tracking-widest italic">Drop zone empty</span></div>';
            return;
        }

        el.innerHTML = list.map(p => `
            <div class="player-card selected" onclick="removePlayer('${p.id}', '${side}')">
                <div class="flex items-center gap-2">
                    <span class="pos-badge pos-${p.pos}">${p.pos}</span>
                    <span class="text-sm font-semibold">${p.name}</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bebas text-amber-500">${p.value.toLocaleString()}</span>
                    <span class="text-gray-600 hover:text-red-400">✕</span>
                </div>
            </div>
        `).join('');
    }

    async function analyze() {
        const tep = document.getElementById('tePremium').checked;
        const names = [...give, ...get].map(p => p.name);
        
        document.getElementById('analyzeBtn').textContent = "CALCULATING...";
        
        try {
            const resp = await fetch('/api/v2/consensus-values', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({player_ids: names, te_premium: tep})
            });
            const data = await resp.json();
            showModal(data, tep);
        } catch(e) {
            alert("API connection failed.");
        } finally {
            document.getElementById('analyzeBtn').textContent = "ANALYZE BLEND";
        }
    }

    function showModal(data, tep) {
        const map = {};
        data.forEach(p => map[p.name] = p);

        const gv = give.reduce((s, p) => s + (map[p.name]?.consensus || p.value), 0);
        const rv = get.reduce((s, p) => s + (map[p.name]?.consensus || p.value), 0);
        const diff = Math.round(rv - gv);

        document.getElementById('modalGiveVal').textContent = Math.round(gv).toLocaleString();
        document.getElementById('modalGetVal').textContent = Math.round(rv).toLocaleString();
        document.getElementById('modalDiffVal').textContent = (diff > 0 ? '+' : '') + diff.toLocaleString();
        
        let msg = `Cross-referencing 6 market sources shows this deal is ${Math.abs(diff) < 50 ? 'near-perfect parity' : (diff > 0 ? 'favoring the incoming side' : 'favoring the outgoing side')}.`;
        if (tep) msg += " Tight End Premium was active for this calculation.";
        
        document.getElementById('modalNarrative').textContent = msg;
        document.getElementById('resultsModal').style.display = 'flex';

        const ctx = document.getElementById('balanceChart').getContext('2d');
        if (balanceChart) balanceChart.destroy();
        balanceChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [gv, rv],
                    backgroundColor: ['#EF4444', '#10B981'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270
                }]
            },
            options: { cutout: '85%', plugins: { legend: { display: false } } }
        });
    }

    function closeResults() { document.getElementById('resultsModal').style.display = 'none'; }
    
    function shareTrade() {
        const txt = `Trade Evaluation via DynastyDroid:\nGIVE: ${give.map(p=>p.name).join(', ')}\nGET: ${get.map(p=>p.name).join(', ')}\nDelta: ${document.getElementById('modalDiffVal').textContent}`;
        navigator.clipboard.writeText(txt);
        alert("Copied!");
    }
</script>
</body>
</html>

<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0a0a15;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff4500;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00a5c4;stop-opacity:1" />
        </linearGradient>
        
        <!-- Filters -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="clawGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Left Arm -->
    <path d="M18 55 Q5 55 5 70 Q5 85 18 80" 
          stroke="#00e5ff" stroke-width="3" fill="none" filter="url(#glow)"/>
    <!-- Left Claw -->
    <g filter="url(#clawGlow)">
        <path d="M5 85 Q-5 95 5 105 Q15 100 10 90" fill="url(#clawGrad)"/>
        <path d="M5 85 Q-8 88 -5 78 Q5 75 10 80" fill="url(#clawGrad)"/>
    </g>
    
    <!-- Right Arm -->
    <path d="M102 55 Q115 55 115 70 Q115 85 102 80" 
          stroke="#00e5ff" stroke-width="3" fill="none" filter="url(#glow)"/>
    <!-- Right Claw -->
    <g filter="url(#clawGlow)">
        <path d="M115 85 Q125 95 115 105 Q105 100 110 90" fill="url(#clawGrad)"/>
        <path d="M115 85 Q128 88 125 78 Q115 75 110 80" fill="url(#clawGrad)"/>
    </g>
    
    <!-- Robot Head (hexagon shape) -->
    <path d="M60 20 L95 35 L95 80 L60 95 L25 80 L25 35 Z" 
          fill="url(#bodyGrad)" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>
    
    <!-- Eyes -->
    <ellipse cx="45" cy="55" rx="10" ry="12" fill="url(#eyeGrad)" filter="url(#glow)"/>
    <ellipse cx="75" cy="55" rx="10" ry="12" fill="url(#eyeGrad)" filter="url(#glow)"/>
    <ellipse cx="45" cy="55" rx="4" ry="6" fill="#ffffff"/>
    <ellipse cx="75" cy="55" rx="4" ry="6" fill="#ffffff"/>
    
    <!-- Mouth line -->
    <line x1="45" y1="75" x2="75" y2="75" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Antenna -->
    <line x1="60" y1="20" x2="60" y2="10" stroke="#ff4500" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="60" cy="8" r="5" fill="#ff4500" filter="url(#clawGlow)"/>
    
    <!-- Football (held by right claw) -->
    <ellipse cx="118" cy="55" rx="8" ry="10" fill="#2d5016" stroke="#ffffff" stroke-width="1"/>
    <path d="M112 55 Q118 50 124 55 Q118 60 112 55" fill="none" stroke="#ffffff" stroke-width="1"/>
    <line x1="118" y1="45" x2="118" y2="65" stroke="#ffffff" stroke-width="1"/>
</svg>

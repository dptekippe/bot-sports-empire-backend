version: '3.8'

services:
  roger-stack:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - RENDER_SERVICE_NAME=roger-stack
    depends_on:
      - postgres
    volumes:
      - ./workspace:/app/workspace

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=roger
      - POSTGRES_PASSWORD=rogerpass
      - POSTGRES_DB=roger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
